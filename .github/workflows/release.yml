name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate version from tag
        id: extract
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a valid semver tag (expected vX.Y.Z)"
            exit 1
          fi
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing buffy v$version"

      - name: Verify Cargo.toml version matches tag
        env:
          EXPECTED: ${{ steps.extract.outputs.version }}
        run: |
          actual=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.+)"/\1/')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "::error::Cargo.toml version is '$actual' but tag implies '$EXPECTED'"
            echo "::error::Bump the version in Cargo.toml before tagging."
            exit 1
          fi

  publish-to-crates-io:
    name: Publish to crates.io
    needs: validate-release-tag
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crates.io/crates/buffy/${{ needs.validate-release-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Verify package builds
        run: cargo publish --dry-run --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
